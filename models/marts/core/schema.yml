version: 2

models:
  - name: dim_customers
    description: >
      Customer dimension containing customer profile information,
      order summary metrics, and derived customer segmentation.

    columns:
      - name: customer_id
        description: Unique identifier for the customer.
        tests:
          - unique
          - not_null

      - name: customer_name
        description: Full name of the customer.

      - name: email
        description: Primary email address associated with the customer.

      - name: phone
        description: Contact phone number for the customer.

      - name: customer_tier
        description: Tier assigned to the customer based on business-defined rules.

      - name: city
        description: City where the customer is located.

      - name: country_code
        description: ISO country code associated with the customer.

      - name: region
        description: Geographic region derived from the country configuration mapping.

      - name: total_orders
        description: Total number of successful orders placed by the customer.

      - name: total_gross_revenue
        description: Total gross revenue generated by the customer before adjustments.

      - name: total_net_revenue
        description: Total net revenue generated by the customer after adjustments.

      - name: avg_order_value
        description: >
          Average net revenue per order calculated as total net revenue
          divided by total orders.
        tests:
          - dbt_expectations.expect_column_mean_to_be_between:
              arguments:
                min_value: 0
                max_value: 100000


      - name: days_since_last_order
        description: Number of days since the customer's most recent order.

      - name: customer_segment
        description: >
          Loyalty segment assigned based on total order count
          (Bronze, Silver, Gold, or Platinum).





  - name: dim_date
    description: >
      Calendar date dimension containing attributes used for reporting,
      filtering, and time-based analysis.

    columns:
      - name: date
        description: Calendar date represented by the row.
        tests:
          - unique
          - not_null

      - name: year
        description: Calendar year of the date.

      - name: quarter
        description: Calendar quarter of the year.

      - name: month
        description: Numeric month of the year.

      - name: month_name
        description: Full name of the month.

      - name: week_of_year
        description: Week number within the calendar year.

      - name: day_of_month
        description: Day number within the month.

      - name: day_of_week
        description: Numeric day of week value.

      - name: day_name
        description: Name of the day of the week.

      - name: is_weekend
        description: Indicates whether the date falls on a weekend.




  - name: fct_orders
    description:  "{{ doc('streamcart_pipeline') }}"

    meta:
      owner: Data Engineering
      layer: marts
       
    tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          arguments:
            min_value: 1000


    columns:
      - name: order_line_key
        description: >
          Surrogate key generated from the combination of order_id and
          product_id. Used as the unique identifier for each order line.
        tests:
          - unique
          - not_null

      - name: customer_id
        description: Unique identifier for the customer.
        tests:
          - not_null

      - name: order_id
        description: Unique identifier for the order.

      - name: product_id
        description: Unique identifier for the product.
        tests:
          - not_null  

      - name: order_date
        description: Date on which the order was placed.

      - name: channel
        description: Source channel code associated with the order.

      - name: channel_label
        description: Human-readable channel name derived from the channel mapping table.

      - name: margin_pct
        description: Margin percentage associated with the order line.

      - name: discount_pct
        description: Discount percentage applied to the order line.

      - name: effective_margin_pct
        description: >
          Effective margin percentage after accounting for discounts.
          Calculated as margin_pct * (1 - discount_pct).