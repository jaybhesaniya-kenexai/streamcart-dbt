version: 2

sources:
  - name: raw_streamcart
    description: Raw JSON data ingested from StreamCart source systems.
    database: "Streamcart_{{ target.name }}"
    schema: raw_streamcart

    tables:

      - name: raw_orders
        description: >
          Raw customer order events stored as JSON payloads.
          Contains nested customer, order, items array, payment,
          and metadata objects.

        config:
          loaded_at_field: _loaded_at
          freshness:
            warn_after:
              count: 12
              period: hour
            error_after:
              count: 24
              period: hour

        columns:
          - name: data
            description: Complete order JSON payload stored as VARIANT.

          - name: _loaded_at
            description: Timestamp when the record was loaded into Snowflake.

          - name: _source
            description: Source file name from which the record was ingested.

      - name: raw_products
        description: >
          Raw product catalogue data stored as JSON payloads.
          Contains product attributes, pricing, inventory, tags,
          specifications and warehouse information.

        columns:
          - name: data
            description: Complete product JSON payload stored as VARIANT.

          - name: _loaded_at
            description: Timestamp when the record was loaded into Snowflake.

          - name: _source
            description: Source file name from which the record was ingested.